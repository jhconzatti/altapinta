<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background circle - white -->
  <circle cx="200" cy="200" r="190" fill="white" stroke="none"/>
  
  <!-- ALTA PINTA text at top -->
  <text x="200" y="80" font-family="Arial, sans-serif" font-size="50" font-weight="900" text-anchor="middle" fill="black" letter-spacing="2">ALTA PINTA</text>
  
  <!-- Sandwich illustration -->
  <!-- Top bread/bun - yellow/gold -->
  <g id="top-bun">
    <path d="M 120 140 L 280 140 Q 290 140 290 150 L 290 170 Q 290 175 280 175 L 120 175 Q 110 175 110 170 L 110 150 Q 110 140 120 140" fill="#FFB81C" stroke="black" stroke-width="3"/>
    <!-- Sesame/Grill marks -->
    <line x1="145" y1="145" x2="160" y2="160" stroke="black" stroke-width="2"/>
    <line x1="175" y1="145" x2="190" y2="160" stroke="black" stroke-width="2"/>
    <line x1="215" y1="145" x2="230" y2="160" stroke="black" stroke-width="2"/>
    <line x1="245" y1="150" x2="260" y2="165" stroke="black" stroke-width="2"/>
  </g>
  
  <!-- Filling/lettuce layer - white/green hint -->
  <path d="M 110 175 L 290 175 Q 290 180 280 190 Q 200 200 120 190 Q 110 180 110 175" fill="white" stroke="black" stroke-width="2"/>
  
  <!-- Meat/tomato layer - dark -->
  <rect x="115" y="190" width="170" height="20" rx="3" fill="#8B4513" stroke="black" stroke-width="2"/>
  
  <!-- Cheese layer - yellow -->
  <rect x="115" y="210" width="170" height="15" rx="2" fill="#FFD700" stroke="black" stroke-width="2"/>
  
  <!-- Bottom bun - yellow/gold -->
  <g id="bottom-bun">
    <path d="M 110 225 Q 110 220 120 220 L 280 220 Q 290 220 290 225 L 290 245 Q 290 255 280 255 L 120 255 Q 110 255 110 245" fill="#FFB81C" stroke="black" stroke-width="3"/>
  </g>
  
  <!-- Text below sandwich -->
  <text x="200" y="310" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="black">Si no tiene pinta...</text>
  <text x="200" y="345" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="black">no sale.</text>
</svg>